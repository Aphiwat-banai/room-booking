          method: "POST",

            submittedAt: new Date().toISOString(),
            source: "room-booking-web",

.login-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 20%,rgba(255,255,255,.07) 0%,transparent 60%),radial-gradient(ellipse at 20% 80%,rgba(21,101,192,.3) 0%,transparent 50%);pointer-events:none;}
.login-card{background:#fff;border-radius:20px;padding:2.5rem 2rem;max-width:420px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.35);position:relative;}

.role-card:hover{border-color:#1a237e;background:#f0f4ff;transform:translateY(-2px);}

.pin-label{font-size:.8rem;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.45rem;}

.pin-dots{display:flex;gap:.45rem;justify-content:center;margin:.85rem 0;}

@keyframes toast-in{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toast-out{from{transform:translateX(0);opacity:1}to{transform:translateX(110%);opacity:0}}

.toast-wrap{position:fixed;bottom:1.5rem;right:1.5rem;z-index:300;display:flex;flex-direction:column;gap:.6rem;pointer-events:none;}
.toast{pointer-events:all;background:var(--bg-card);border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.18),0 2px 8px rgba(0,0,0,.1);border:1px solid var(--border2);min-width:300px;max-width:360px;overflow:hidden;animation:toast-in .4s cubic-bezier(.34,1.56,.64,1) forwards;}
.toast.leaving{animation:toast-out .35s ease forwards;}
.toast-body{padding:1rem 1.1rem .85rem;}
.toast-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.55rem;}

.toast-icon.ok{background:#e8f5e9;}
.toast-icon.ot{background:#fff3e0;}

.dark .toast-icon.ot{background:#1f1000;}

.toast-close:hover{background:var(--grp-bg);}
.toast-title{font-family:'Noto Serif Thai',serif;font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:.18rem;}
.toast-sub{font-size:.78rem;color:var(--text3);line-height:1.4;}
.toast-detail{background:var(--grp-bg);border-radius:8px;padding:.5rem .75rem;margin-bottom:.65rem;border:1px solid var(--border3);}

.toast-detail-row:last-child{margin-bottom:0;}
.toast-detail-row span:first-child{color:var(--text3);min-width:14px;}
.toast-actions{display:flex;gap:.5rem;}
.toast-btn-primary{background:linear-gradient(135deg,#1a237e,#1565c0);color:#fff;border:none;padding:.48rem 1rem;border-radius:7px;font-family:'Sarabun',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;flex:1;transition:all .15s;}
.toast-btn-primary:hover{opacity:.9;}
.toast-btn-sec{background:var(--grp-bg);border:1px solid var(--border);color:var(--text2);padding:.48rem .9rem;border-radius:7px;font-family:'Sarabun',sans-serif;font-size:.82rem;cursor:pointer;}
.toast-btn-sec:hover{border-color:var(--border3);}
.toast-bar{height:3px;background:linear-gradient(90deg,#1a237e,#42a5f5);animation:toast-progress 10s linear forwards;}
.toast-bar.ot{background:linear-gradient(90deg,#e65100,#ff6f00);}
.cancel-card{background:var(--pop-bg);border-radius:16px;padding:2rem;max-width:400px;width:100%;box-shadow:var(--pop-sh);border-top:5px solid #c62828;animation:pop-in .25s ease;}
.cancel-ttl{font-family:'Noto Serif Thai',serif;font-size:1.05rem;font-weight:700;color:#c62828;margin-bottom:.5rem;}
.cancel-info{background:var(--grp-bg);border-radius:8px;padding:.75rem 1rem;margin-bottom:1.1rem;font-size:.85rem;color:var(--text2);border:1px solid var(--border3);}
.cancel-info strong{color:var(--text);font-size:.9rem;}
.cancel-actions{display:flex;gap:.65rem;margin-top:1.1rem;}
.btn-cancel-confirm{background:linear-gradient(135deg,#c62828,#b71c1c);color:#fff;border:none;padding:.72rem 1.4rem;border-radius:8px;font-family:'Sarabun',sans-serif;font-size:.92rem;font-weight:600;cursor:pointer;flex:1;transition:all .2s;}
.btn-cancel-confirm:hover{background:linear-gradient(135deg,#b71c1c,#a00);}
.btn-cancel-confirm:disabled{opacity:.4;cursor:default;}
.btn-cancel-back{background:var(--grp-bg);border:1px solid var(--border);color:var(--text2);padding:.72rem 1.2rem;border-radius:8px;font-family:'Sarabun',sans-serif;font-size:.92rem;cursor:pointer;flex:1;}
.btn-cancel-back:hover{border-color:var(--border3);}
/* Webhook status badge */
.wh-badge{display:inline-flex;align-items:center;gap:.3rem;font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:600;}
.wh-sending{background:#fff3e0;color:#e65100;}
.wh-ok{background:#e8f5e9;color:#2e7d32;}
.wh-err{background:#fce4ec;color:#c62828;}
.dark .wh-sending{background:#1f1000;color:#ff8a50;}
.dark .wh-ok{background:#0a2410;color:#66bb6a;}
.dark .wh-err{background:#2a0a10;color:#ef9a9a;}
@media(max-width:700px){.fgrid{grid-template-columns:1fr;}.main{padding:1rem;}.cal-cell{min-height:55px;}.hdr-right{gap:.25rem;}}
`;

    // ── PinPad ───────────────────────────────────────────────────────────────
    function PinPad({ onSuccess, onBack }) {
      const [pin, setPin] = useState("");
      const [err, setErr] = useState(false);
      const press = (d) => {
        if (pin.length >= 4) return;
        const n = pin + d;
        setPin(n); setErr(false);
        if (n.length === 4) setTimeout(() => { n === TEACHER_PIN ? onSuccess() : (setErr(true), setPin("")); }, 180);
      };
      return (
        <div>
          <div className="pin-label">🔑 กรอก PIN อาจารย์ (4 หลัก)</div>
          <div className="pin-dots">{[0,1,2,3].map(i=><div key={i} className={`pin-dot${i<pin.length?" filled":""}`}/>)}</div>
          {err && <div className="pin-error shake">❌ PIN ไม่ถูกต้อง กรุณาลองใหม่</div>}
          <div className="pin-pad">
            {[1,2,3,4,5,6,7,8,9].map(n=><button key={n} className="pin-key" onClick={()=>press(String(n))}>{n}</button>)}
            <div/><button className="pin-key pin-zero" onClick={()=>press("0")}>0</button>
            <button className="pin-key pin-del" onClick={()=>{setPin(p=>p.slice(0,-1));setErr(false);}}>⌫</button>
          </div>
          <button className="btn-back" onClick={onBack}>← กลับเลือกสถานะ</button>
          <div className="demo-hint">PIN สาธิต: 1234</div>
        </div>
      );
    }

    // ── LoginScreen ──────────────────────────────────────────────────────────
    function LoginScreen({ onLogin, dark, toggleDark }) {
      const [step, setStep] = useState("choose");
      return (
        <div className={`login-bg${dark?" dark":""}`}>
          <button onClick={toggleDark} style={{position:"absolute",top:"1rem",right:"1rem",background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",color:"white",padding:".35rem .8rem",borderRadius:"20px",cursor:"pointer",fontFamily:"Sarabun,sans-serif",fontSize:".78rem",display:"flex",alignItems:"center",gap:".35rem"}}>
            {dark?"☀️ Light":"🌙 Dark"}
          </button>
          <div className="login-card">
            <div className="login-top">
              <div className="login-logo">🏛️</div>
              <div className="login-title">ระบบจองห้องออนไลน์</div>
              <div className="login-sub">Department of Mathematics · Faculty of Science</div>
            </div>
            {step==="choose" ? (
              <>
                <div style={{fontSize:".85rem",fontWeight:600,color:dark?"#9da3c4":"#666",marginBottom:".7rem",textAlign:"center"}}>เลือกสถานะของคุณเพื่อเข้าใช้งาน</div>
                <div className="role-cards">
                  <button className="role-card" onClick={()=>onLogin("นิสิต")}>
                    <span className="rc-icon">🎓</span><div className="rc-name">นิสิต</div><div className="rc-desc">เข้าได้ทันที</div>
                  </button>
                  <button className="role-card" onClick={()=>setStep("pin")}>
                    <span className="rc-icon">👨‍🏫</span><div className="rc-name">อาจารย์</div><div className="rc-desc">ต้องยืนยัน PIN</div>
                  </button>
                </div>
                <div style={{textAlign:"center",fontSize:".73rem",color:"#aaa"}}>🔒 ระบบแยกสิทธิ์การใช้งานตามสถานะ</div>
              </>
            ) : <PinPad onSuccess={()=>onLogin("อาจารย์")} onBack={()=>setStep("choose")}/>}
          </div>
        </div>
      );
    }

    // ── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [dark,        setDark]        = useState(false);
      const [session,     setSession]     = useState(null);
      const [tab,         setTab]         = useState("booking");
      const [bookings,    setBookings]    = useState(INIT_BOOKINGS);
      const [form,        setForm]        = useState({name:"",date:"",startTime:"",endTime:"",room:"",purpose:"",groupSize:1,members:[],advisorName:"",advisorEmail:"",isOT:false,slot:""});
      const [submitMsg,   setSubmitMsg]   = useState(null);
      const [calDate,     setCalDate]     = useState(new Date(2026,2,1));
      const [popup,       setPopup]       = useState(null);
      const [filterRoom,  setFilterRoom]  = useState("all");
      const [calFR,       setCalFR]       = useState("all");
      const [adminPw,     setAdminPw]     = useState("");
      const [adminAuth,   setAdminAuth]   = useState(false);
      const [adminMsg,    setAdminMsg]    = useState(null);
      const [cancelModal, setCancelModal] = useState(null);
      const [toast,       setToast]       = useState(null);
      const [webhookStatus, setWebhookStatus] = useState(null); // null | "sending" | "ok" | "err"
      const [reports,     setReports]     = useState([
        {id:1, room:"MA103", type:"projector", detail:"โปรเจคเตอร์เปิดไม่ติด", reporter:"สมชาย ใจดี", date:"2026-03-06", status:"open"},
      ]);
      const [reportForm,  setReportForm]  = useState({room:"",type:"",detail:"",reporter:""});
      const [reportMsg,   setReportMsg]   = useState(null);
      const [nowTime,     setNowTime]     = useState(()=>{ const n=new Date(); return `${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`; });

      const year = calDate.getFullYear(), month = calDate.getMonth();
      const firstDay = new Date(year,month,1).getDay();
      const daysInMonth = new Date(year,month+1,0).getDate();
      const todayObj = new Date();

      const bookingsByDate = useMemo(()=>{
        const map={};
        const src = calFR==="all" ? bookings : bookings.filter(b=>b.room===calFR);
        src.forEach(b=>{if(!map[b.date])map[b.date]=[];map[b.date].push(b);});
        return map;
      },[bookings,calFR]);

      const toggleDark = () => setDark(d=>!d);

      if (!session) return (
        <>
          <style>{CSS}</style>
          <LoginScreen onLogin={r=>{setSession(r);setTab("booking");}} dark={dark} toggleDark={toggleDark}/>
        </>
      );

      const toMin = s => { const [h,m]=s.split(":").map(Number); return h*60+m; };

      const getRule = (purpose, isOT) => (!isOT && PURPOSE_RULES[purpose]) ? PURPOSE_RULES[purpose] : null;

      const setF = (k, v) => setForm(f => {
        const u = { ...f, [k]: v };
        if (k === "isOT") { u.slot = ""; u.startTime = ""; u.endTime = ""; if (!v) { u.advisorName = ""; u.advisorEmail = ""; } }
        if (k === "purpose") { u.slot = ""; u.startTime = ""; u.endTime = ""; }
        if (k === "slot" && v) { const [s, e] = v.split("-"); u.startTime = s; u.endTime = e; }
        if (k === "groupSize") { u.members = f.members.slice(0, Math.max(0, (parseInt(v)||1) - 1)); }
        return u;
      });

      const updateMember=(idx,key,val)=>setForm(f=>({...f,members:f.members.map((m,i)=>i===idx?{...m,[key]:val}:m)}));

      const buildMailto=(bk)=>{
        const sub=encodeURIComponent(`[ขออนุมัติจองห้องนอกเวลา] ${bk.room} วันที่ ${bk.date}`);
        const body=encodeURIComponent(`เรียน อาจารย์ ${bk.advisorName}\n\nนิสิต ${bk.name} ขออนุมัติใช้ห้อง ${bk.room}\nวันที่: ${bk.date}\nเวลา: ${bk.startTime} – ${bk.endTime}\nวัตถุประสงค์: ${bk.purpose}\nจำนวน: ${bk.groupSize} คน\n\nกรุณาตอบกลับเพื่อ อนุมัติ หรือ ปฏิเสธ\nรหัสคำขอ: #${bk.id}\nระบบจองห้อง — ภาควิชาคณิตศาสตร์`);
        return `mailto:${bk.advisorEmail}?subject=${sub}&body=${body}`;
      };

      const genCode = () => "BK-" + Math.random().toString(36).toUpperCase().slice(2,6);

      // ── Webhook send helper ─────────────────────────────────────────────
      const webhookSend = async (payload) => {
        setWebhookStatus("sending");
        try {
          const res = await fetch(N8N_WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              ...payload,
              submittedAt: new Date().toISOString(),
              source: "room-booking-web",
            }),
          });
          setWebhookStatus(res.ok ? "ok" : "err");
          setTimeout(() => setWebhookStatus(null), 4000);
        } catch (err) {
          console.error("Webhook error:", err);
          setWebhookStatus("err");
          setTimeout(() => setWebhookStatus(null), 4000);
        }
      };

      const handleSubmit=()=>{
        if(!form.name||!form.date||!form.room||!form.purpose){setSubmitMsg({type:"err",text:"⚠️ กรุณากรอกข้อมูลให้ครบถ้วน"});return;}
        if(!form.startTime||!form.endTime){setSubmitMsg({type:"err",text:"⚠️ กรุณาเลือกช่วงเวลา"});return;}
        if(session==="นิสิต"&&!form.isOT){
          const dow = new Date(form.date).getDay();
          if(dow===0||dow===6){setSubmitMsg({type:"err",text:"⚠️ นิสิตจองได้เฉพาะวันจันทร์–ศุกร์"});return;}
          const stMin=toMin(form.startTime), etMin=toMin(form.endTime);
          if(stMin<480||etMin>1020){setSubmitMsg({type:"err",text:"⚠️ เวลาราชการ 08:00–17:00 น. เท่านั้น"});return;}
        }
        const gs=parseInt(form.groupSize)||1;
        if(gs>1&&form.members.some(m=>!m.name)){setSubmitMsg({type:"err",text:"⚠️ กรุณากรอกชื่อสมาชิกให้ครบ"});return;}
        if(form.isOT){
          if(!form.advisorName.trim()){setSubmitMsg({type:"err",text:"⚠️ กรุณาระบุชื่ออาจารย์ผู้ดูแล"});return;}
          if(!form.advisorEmail.includes("@")){setSubmitMsg({type:"err",text:"⚠️ กรุณาระบุ Email อาจารย์ให้ถูกต้อง"});return;}
        }
        const stNew = toMin(form.startTime);
        const etNew = toMin(form.endTime);
        const conflict = bookings.find(b =>
          b.room === form.room && b.date === form.date && b.status !== "cancelled" &&
          stNew < toMin(b.endTime) && etNew > toMin(b.startTime)
        );
        if(conflict){
          const stLabel = ST[conflict.status]?.label || conflict.status;
          setSubmitMsg({type:"err", text:`❌ ห้อง ${form.room} ช่วง ${conflict.startTime}–${conflict.endTime} มีการจองอยู่แล้ว (${stLabel})`});
          return;
        }
        const roomMeta = ROOMS.find(r=>r.id===form.room);
        const needsAdvisor = form.isOT || (session==="นิสิต" && roomMeta?.needsApproval);
        if(needsAdvisor && !form.advisorName.trim()){setSubmitMsg({type:"err",text:`⚠️ ห้อง ${form.room} ต้องมีอาจารย์ Approve — กรุณาระบุชื่อ+Email อาจารย์`});return;}

        const code = genCode();
        const bk={
          id: Date.now(), code, ...form, groupSize: gs,
          role: session,
          status: needsAdvisor ? "awaiting_advisor" : "pending",
          isOT: form.isOT,
          memberNames: form.members.map(m=>m.name).join(", "),
          memberIds: form.members.map(m=>m.studentId||"").join(", "),
        };

        setBookings(b=>[bk,...b]);
        setForm({name:"",date:"",startTime:"",endTime:"",room:"",purpose:"",groupSize:1,members:[],advisorName:"",advisorEmail:"",isOT:false,slot:""});
        setSubmitMsg(null);

        // ── ส่งข้อมูลไปยัง n8n → Google Sheets ──────────────────────────
        webhookSend({
          action:       "new_booking",
          bookingCode:  code,
          name:         bk.name,
          role:         bk.role,
          room:         bk.room,
          date:         bk.date,
          startTime:    bk.startTime,
          endTime:      bk.endTime,
          purpose:      bk.purpose,
          groupSize:    gs,
          memberNames:  bk.memberNames,
          memberIds:    bk.memberIds,
          advisorName:  bk.advisorName || "",
          advisorEmail: bk.advisorEmail || "",
          isOT:         bk.isOT,
          status:       bk.status,
          needsAdvisor: needsAdvisor,
        });

        if(needsAdvisor) setTimeout(()=>window.open(buildMailto(bk),"_blank"),300);
        setToast({isOT:needsAdvisor, room:bk.room, date:bk.date, startTime:bk.startTime, endTime:bk.endTime, gs, name:bk.name, code});
        setTimeout(()=>setToast(null), 10000);
      };

      const calCells=[];

                              <div style={{flex:1}}>
                                <div style={{display:"flex",gap:".5rem",alignItems:"center",marginBottom:".25rem",flexWrap:"wrap"}}>
                                  <span style={{fontWeight:700,fontSize:".85rem",color:dark?"#e8eaf6":"#1a237e"}}>{r.room}</span>
                                  <span style={{fontSize:".76rem",color:"var(--text3)"}}>{typeLabel}</span>
                                  <span style={{fontSize:".7rem",color:"var(--text4)"}}>{r.date}</span>
                                </div>
                                <div style={{fontSize:".8rem",color:"var(--text2)",lineHeight:1.4}}>{r.detail}</div>
                                {r.reporter!=="ไม่ระบุ"&&<div style={{fontSize:".72rem",color:"var(--text3)",marginTop:".2rem"}}>👤 {r.reporter}</div>}
                              </div>
                              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:".3rem"}}>
                                <span style={{fontSize:".72rem",fontWeight:700,padding:"2px 7px",borderRadius:"10px",background:r.status==="open"?(dark?"#3d1f00":"#ffe0b2"):(dark?"#0a2410":"#c8e6c9"),color:r.status==="open"?"#e65100":"#2e7d32"}}>
                                  {r.status==="open"?"🔴 รอดำเนินการ":"✅ แก้ไขแล้ว"}
                                </span>
                                {session==="อาจารย์"&&r.status==="open"&&(
                                  <button onClick={()=>setReports(rs=>rs.map(x=>x.id===r.id?{...x,status:"resolved"}:x))} className="btn-g" style={{fontSize:".72rem",padding:"2px 7px"}}>✓ แก้ไขแล้ว</button>
                                )}
                              </div>
                            </div>
                          </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* ══ ADMIN ══ */}
              {tab==="admin"&&session==="อาจารย์"&&(
                <div>
                  <div className="sec-hdr"><div className="sec-icon">🔐</div><h2>ส่วนจัดการสำหรับเจ้าหน้าที่</h2></div>
                  <div className="divider"/>
                  {!adminAuth?(
                    <div className="card" style={{maxWidth:370}}>
                      <div style={{textAlign:"center",marginBottom:"1.4rem"}}>
                        <div style={{fontSize:"2.3rem",marginBottom:".35rem"}}>👩‍💼</div>
                        <div style={{fontFamily:"Noto Serif Thai,serif",fontSize:"1rem",fontWeight:700,color:dark?"#ce93d8":"#4a148c"}}>เข้าสู่ระบบเจ้าหน้าที่</div>
                      </div>
                      {adminMsg&&<div className={`alert a-${adminMsg.type==="ok"?"ok":"err"}`}>{adminMsg.text}</div>}
                      <div className="fg" style={{marginBottom:"1rem"}}>
                        <label className="flabel">รหัสผ่าน</label>
                        <input type="password" className="finput" placeholder="••••••••" value={adminPw} onChange={e=>setAdminPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(adminPw===ADMIN_PW?(setAdminAuth(true),setAdminMsg(null)):setAdminMsg({type:"err",text:"❌ รหัสผ่านไม่ถูกต้อง"}))}/>
                      </div>
                      <button className="btn-p" style={{width:"100%",justifyContent:"center"}} onClick={()=>adminPw===ADMIN_PW?(setAdminAuth(true),setAdminMsg(null)):setAdminMsg({type:"err",text:"❌ รหัสผ่านไม่ถูกต้อง"})}>🔑 เข้าสู่ระบบ</button>
                      <div className="demo-hint" style={{marginTop:".55rem"}}>รหัสสาธิต: admin1234</div>
                    </div>
                  ):(
                    <div>
                      <div className="adm-hdr">
                        <div style={{fontSize:"1.3rem"}}>👩‍💼</div>
                        <div><h3>ระบบจัดการข้อมูลการจอง</h3><p>สำหรับเจ้าหน้าที่ภาควิชาเท่านั้น</p></div>
                        <button onClick={()=>{setAdminAuth(false);setAdminPw("");}} style={{marginLeft:"auto",background:"rgba(255,255,255,.2)",border:"none",color:"#fff",padding:".35rem .75rem",borderRadius:"6px",cursor:"pointer",fontFamily:"Sarabun,sans-serif",fontSize:".78rem"}}>ออก</button>
                      </div>
                      <div className="adm-body">
                        {adminMsg&&<div style={{padding:"1rem 1.4rem 0"}}><div className={`alert a-${adminMsg.type==="ok"?"ok":"err"} sli`}>{adminMsg.text}</div></div>}
                        <div style={{overflowX:"auto"}}>
                          <table className="tbl">
                            <thead><tr><th>ชื่อ-สกุล</th><th>สถานะ</th><th>ห้อง</th><th>วันที่</th><th>เวลา</th><th>วัตถุประสงค์</th><th>สถานะ</th><th>จัดการ</th></tr></thead>
                            <tbody>
                              {bookings.map(b=>(
                                <tr key={b.id}>
                                  <td style={{fontWeight:600}}>{b.name}</td>
                                  <td>{b.role==="นิสิต"?"🎓":"👨‍🏫"} {b.role}</td>
                                  <td><strong>{b.room}</strong></td>
                                  <td>{b.date}</td><td>{b.startTime}–{b.endTime}</td><td>{b.purpose}</td>
                                  <td><span className="sbadge" style={stBadgeStyle(b.status)}>{ST[b.status]?.label}</span></td>
                                  <td>
                                    <div style={{display:"flex",gap:".35rem"}}>
                                      {(b.status==="pending"||b.status==="awaiting_advisor")&&(
                                        <button className="btn-g" onClick={()=>{
                                          setBookings(bs=>bs.map(x=>x.id===b.id?{...x,status:"approved"}:x));
                                          setAdminMsg({type:"ok",text:"✅ อนุมัติเรียบร้อย"});
                                          setTimeout(()=>setAdminMsg(null),3000);
                                          webhookSend({action:"approve_booking",bookingCode:b.code,name:b.name,room:b.room,date:b.date,status:"approved"});
                                        }}>✓ อนุมัติ</button>
                                      )}
                                      <button className="btn-d" onClick={()=>{
                                        setBookings(bs=>bs.filter(x=>x.id!==b.id));
                                        setAdminMsg({type:"ok",text:"✅ ลบเรียบร้อย"});
                                        setTimeout(()=>setAdminMsg(null),3000);
                                      }}>🗑 ลบ</button>
                                    </div>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </main>
          </div>

          {/* Cancel Modal */}
          {cancelModal&&(
            <div className="pop-ov" onClick={()=>setCancelModal(null)}>
              <div className={`cancel-card${D}`} onClick={e=>e.stopPropagation()}>
                <div style={{fontSize:"2rem",textAlign:"center",marginBottom:".5rem"}}>🗑️</div>
                <div className="cancel-ttl" style={{textAlign:"center"}}>ยืนยันการยกเลิกการจอง</div>
                <p style={{fontSize:".82rem",color:"var(--text3)",textAlign:"center",marginBottom:"1.1rem"}}>กรุณากรอก <strong style={{color:dark?"#7986cb":"#1a237e"}}>รหัสการจอง</strong> เพื่อยืนยัน</p>
                <div className="cancel-info">
                  <div style={{marginBottom:".3rem"}}><strong>{cancelModal.booking.name}</strong></div>
                  <div>🏫 ห้อง <strong>{cancelModal.booking.room}</strong> &nbsp;·&nbsp; 📅 {cancelModal.booking.date}</div>
                  <div>⏰ {cancelModal.booking.startTime} – {cancelModal.booking.endTime} &nbsp;·&nbsp; {cancelModal.booking.purpose}</div>
                </div>
                <div style={{background:dark?"#1a1f35":"#e8eaf6",border:`1px solid ${dark?"#2e3a6e":"#c5cae9"}`,borderRadius:"8px",padding:".6rem .9rem",marginBottom:"1rem",display:"flex",alignItems:"center",gap:".6rem"}}>
                  <span style={{fontSize:"1.1rem"}}>🔑</span>
                  <div>
                    <div style={{fontSize:".75rem",color:"var(--text3)",marginBottom:".15rem"}}>รหัสการจองของคุณ (จาก Toast ตอนจอง)</div>
                    <div style={{fontFamily:"monospace",fontSize:".95rem",fontWeight:700,color:dark?"#7986cb":"#1a237e",letterSpacing:"2px"}}>{cancelModal.booking.code||"ไม่มีรหัส"}</div>
                  </div>
                </div>
                <div className="fg" style={{marginBottom:".5rem"}}>
                  <label className="flabel">รหัสการจอง <span>*</span></label>
                  <input className={`finput${cancelModal.err?" shake":""}`} placeholder="เช่น BK-A3F9"
                    value={cancelModal.codeInput}
                    onChange={e=>setCancelModal(m=>({...m,codeInput:e.target.value.toUpperCase(),err:null}))}
                    onKeyDown={e=>e.key==="Enter"&&confirmCancel()}
                    autoFocus
                    style={{fontFamily:"monospace",letterSpacing:"2px",fontWeight:700,textTransform:"uppercase",
                      borderColor:cancelModal.err?"#c62828":cancelModal.codeInput&&cancelModal.codeInput===cancelModal.booking.code?"#2e7d32":""}}
                  />
                  {cancelModal.err&&<div style={{fontSize:".78rem",color:"#c62828",marginTop:".3rem"}}>{cancelModal.err}</div>}
                  {!cancelModal.err&&cancelModal.codeInput&&cancelModal.codeInput.toUpperCase()===(cancelModal.booking.code||"").toUpperCase()&&(
                    <div style={{fontSize:".78rem",color:"#2e7d32",marginTop:".3rem"}}>✅ รหัสถูกต้อง</div>
                  )}
                </div>
                <div className="cancel-actions">
                  <button className="btn-cancel-back" onClick={()=>setCancelModal(null)}>← กลับ</button>
                  <button className="btn-cancel-confirm" disabled={!cancelModal.codeInput} onClick={confirmCancel}>ยืนยันยกเลิกการจอง</button>
                </div>
              </div>
            </div>
          )}

          {/* Popup */}
          {popup&&(
            <div className="pop-ov" onClick={()=>setPopup(null)}>
              <div className={`pop-card${D}`} onClick={e=>e.stopPropagation()}>
                <div className="pop-ttl">📋 รายละเอียดการจอง</div>
                {[["ชื่อ-สกุล",popup.name],["สถานะ",popup.role],["ห้อง",popup.room],["วันที่",popup.date],["เวลา",`${popup.startTime} – ${popup.endTime}`],["วัตถุประสงค์",popup.purpose]].map(([l,v])=>(
                  <div key={l} className="pop-row"><span className="pop-lbl">{l}</span><span>{v}</span></div>
                ))}
                <div className="pop-row"><span className="pop-lbl">สถานะ</span><span className="sbadge" style={stBadgeStyle(popup.status)}>{ST[popup.status]?.label}</span></div>
                <button className="pop-close" onClick={()=>setPopup(null)}>ปิด</button>
              </div>
            </div>
          )}

          {/* Toast */}
          <div className="toast-wrap">
            {toast&&(
              <div className="toast">
                <div className="toast-body">
                  <div className="toast-top">
                    <div style={{display:"flex",gap:".7rem",alignItems:"flex-start",flex:1}}>
                      <div className={`toast-icon ${toast.isOT?"ot":"ok"}`}>{toast.isOT?"📧":"✅"}</div>
                      <div style={{flex:1}}>
                        <div className="toast-title">{toast.isOT?"ส่งคำขอจองนอกเวลาแล้ว!":"จองห้องสำเร็จ!"}</div>
                        <div className="toast-sub">{toast.isOT?"รอการอนุมัติจากอาจารย์":"รอการอนุมัติจากเจ้าหน้าที่"}</div>
                      </div>
                    </div>
                    <button className="toast-close" onClick={()=>setToast(null)}>✕</button>
                  </div>
                  <div className="toast-detail">
                    <div className="toast-detail-row"><span>🏫</span><span>ห้อง <strong>{toast.room}</strong></span></div>
                    <div className="toast-detail-row"><span>📅</span><span>{toast.date}</span></div>
                    <div className="toast-detail-row"><span>⏰</span><span>{toast.startTime} – {toast.endTime}</span></div>
                    <div className="toast-detail-row"><span>👤</span><span>{toast.name}</span></div>
                  </div>
                  <div style={{background:dark?"#1a1f35":"#e8eaf6",border:`2px dashed ${dark?"#3949ab":"#9fa8da"}`,borderRadius:"10px",padding:".6rem 1rem",marginBottom:".75rem",textAlign:"center"}}>
                    <div style={{fontSize:".72rem",color:"var(--text3)",marginBottom:".2rem"}}>🔑 รหัสการจอง — เก็บไว้สำหรับยกเลิก</div>
                    <div style={{fontFamily:"monospace",fontSize:"1.4rem",fontWeight:700,color:dark?"#7986cb":"#1a237e",letterSpacing:"4px"}}>{toast.code}</div>
                    <div style={{fontSize:".68rem",color:"var(--text3)",marginTop:".2rem"}}>จดรหัสนี้ไว้ ห้ามบอกผู้อื่น</div>
                  </div>
                  <div className="toast-actions">
                    <button className="toast-btn-primary" onClick={()=>{setTab("list");setToast(null);}}>📋 ดูรายการจอง</button>
                    <button className="toast-btn-sec" onClick={()=>setToast(null)}>ปิด</button>
                  </div>
                </div>
                <div className={`toast-bar${toast.isOT?" ot":""}`}/>
              </div>
            )}
          </div>
        </>
      );
    }

    // ── Mount ────────────────────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
